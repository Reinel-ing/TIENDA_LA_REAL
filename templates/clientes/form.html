{% extends 'base.html' %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente – Tienda La Real{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('clientes') }}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="page-title mb-0">{{ 'Editar Cliente' if cliente else 'Nuevo Cliente' }}</h1>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre completo <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control"
                               value="{{ cliente.nombre if cliente else '' }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Teléfono</label>
                        <input type="text" name="telefono" class="form-control"
                               value="{{ cliente.telefono if cliente else '' }}" placeholder="Ej: 3001234567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ cliente.email if cliente else '' }}" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Dirección</label>
                        <textarea name="direccion" class="form-control" rows="2"
                                  placeholder="Barrio, calle, número…">{{ cliente.direccion if cliente else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-save me-2"></i>{{ 'Guardar Cambios' if cliente else 'Registrar Cliente' }}
                        </button>
                        <a href="{{ url_for('clientes') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
